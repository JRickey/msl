name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Compute version
        id: version
        run: |
          echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Install toolchain helpers
        run: |
          brew install cargo-zigbuild xcodegen zig meson ninja bison
          rustup target add aarch64-unknown-linux-musl

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: |
            host/.build
            host/.swiftpm
          key: release-swift-${{ runner.os }}-${{ hashFiles('host/Package.resolved', 'host/Package.swift') }}
          restore-keys: release-swift-${{ runner.os }}-

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            guest/target
          key: release-cargo-${{ runner.os }}-${{ hashFiles('guest/Cargo.lock', 'guest/**/Cargo.toml') }}
          restore-keys: release-cargo-${{ runner.os }}-

      - name: Cache build downloads
        uses: actions/cache@v4
        with:
          path: |
            build/cache
            kernel/build
            guest/target/xkb-build
            guest/target/xkb-musl
          key: release-assets-${{ runner.os }}-${{ hashFiles('kernel/Makefile', 'tools/mk-*.sh', 'guest/Cargo.lock') }}
          restore-keys: release-assets-${{ runner.os }}-

      - name: Import Apple signing assets
        env:
          APP_CERT: ${{ secrets.DEVELOPER_ID_APPLICATION_CERT_P12_BASE64 }}
          APP_CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_APPLICATION_CERT_PASSWORD }}
          INSTALLER_CERT: ${{ secrets.DEVELOPER_ID_INSTALLER_CERT_P12_BASE64 }}
          INSTALLER_CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_INSTALLER_CERT_PASSWORD }}
          FSKIT_PROFILE: ${{ secrets.FSKIT_DEVELOPER_ID_PROFILE_BASE64 }}
        run: |
          security create-keychain -p "$RUNNER_TEMP" release.keychain-db
          security set-keychain-settings -lut 21600 release.keychain-db
          security unlock-keychain -p "$RUNNER_TEMP" release.keychain-db
          security list-keychains -d user -s release.keychain-db
          echo "$APP_CERT" | base64 --decode > "$RUNNER_TEMP/app.p12"
          echo "$INSTALLER_CERT" | base64 --decode > "$RUNNER_TEMP/installer.p12"
          security import "$RUNNER_TEMP/app.p12" -k release.keychain-db -P "$APP_CERT_PASSWORD" -T /usr/bin/codesign
          security import "$RUNNER_TEMP/installer.p12" -k release.keychain-db -P "$INSTALLER_CERT_PASSWORD" -T /usr/bin/productbuild
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$RUNNER_TEMP" release.keychain-db
          echo "$FSKIT_PROFILE" | base64 --decode > "$RUNNER_TEMP/fskit.provisionprofile"

      - name: Build signed pkg
        env:
          FSKIT_PROVISION_PROFILE: ${{ runner.temp }}/fskit.provisionprofile
        run: |
          make release-pkg VERSION="${{ steps.version.outputs.version }}" MSL_TEAM_ID="${{ secrets.APPLE_TEAM_ID }}"

      - name: Notarize and staple
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          pkg="build/msl-${VERSION}.pkg"
          xcrun notarytool submit "$pkg" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple "$pkg"
          xcrun stapler validate "$pkg"
          spctl --assess --type install "$pkg"
          shasum -a 256 "$pkg" > "$pkg.sha256"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/msl-${{ steps.version.outputs.version }}.pkg
            build/msl-${{ steps.version.outputs.version }}.pkg.sha256
          draft: true

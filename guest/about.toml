# cargo-about config (companion to deny.toml's [licenses] allow-list — keep
# the two lists in sync). Generates THIRD-PARTY-LICENSES at the repo root:
#   cargo about generate -m guest/Cargo.toml -c guest/about.toml --workspace \
#     --target aarch64-unknown-linux-musl --locked \
#     tools/third-party-licenses.hbs -o THIRD-PARTY-LICENSES

accepted = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
]

targets = ["aarch64-unknown-linux-musl"]

ignore-build-dependencies = true
ignore-dev-dependencies = true
ignore-transitive-dependencies = false

[private]
ignore = true
